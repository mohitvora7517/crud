{% extends 'base.html' %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-6 col-lg-5">
    <div class="card shadow-sm">
      <div class="card-body p-4">
        <h4 class="mb-3">{{ 'Create account' if mode == 'signup' else 'Login' }}</h4>
        <form method="post">
          {% if mode == 'signup' %}
            <label class="form-label">Name</label>
            <input class="form-control mb-2" name="name" required />
          {% endif %}
          <label class="form-label">Email</label>
          <input class="form-control mb-2" name="email" type="email" required />
          <label class="form-label">Password</label>
          <input class="form-control mb-3" name="password" type="password" required />
          <button class="btn btn-primary w-100" type="submit">{{ 'Create account' if mode == 'signup' else 'Login' }}</button>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
